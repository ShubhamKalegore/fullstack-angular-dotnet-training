<div class="container mt-4">

  <div class="row g-4 mb-4">

    <!-- Content Day -->
    <div class="col-md-6">

      <label
        class="form-label"
        for="contentDay"
      >
        Select content day (Completed)
      </label>

      <select
        id="contentDay"
        class="form-select"
        [(ngModel)]="selectedDay"
        (change)="navigateDay()"
      >

        <option
          *ngFor="let day of contentDays"
          [value]="day.value"
        >
          {{ day.label }}
        </option>

      </select>

      <div class="form-check mt-2">

        <input
          id="showContentDay"
          class="form-check-input"
          type="checkbox"
          [(ngModel)]="showContentDay"
        >

        <label
          class="form-check-label"
          for="showContentDay"
        >
          Show content day
        </label>

      </div>

    </div>

    <!-- Training Plan Day -->
    <div class="col-md-6">

      <label
        class="form-label"
        for="trainingDay"
      >
        Select training plan day
      </label>

      <select
        id="trainingDay"
        class="form-select"
        [(ngModel)]="selectedTrainingDay"
        (change)="navigateTrainingDay()"
      >

        <option
          *ngFor="let day of trainingDays"
          [value]="day.day"
        >
          {{ day.day | titlecase }}
        </option>

      </select>

      <div class="form-check mt-2">

        <input
          id="showTrainingPlan"
          class="form-check-input"
          type="checkbox"
          [(ngModel)]="showTrainingPlan"
        >

        <label
          class="form-check-label"
          for="showTrainingPlan"
        >
          Show training plan
        </label>

      </div>

    </div>

  </div>

  <!-- Training Plan -->
  <app-training-plan
    *ngIf="showTrainingPlan"
    [selectedDay]="selectedTrainingDay"
  >
  </app-training-plan>

  <!-- Routed Day Content -->
  <router-outlet
    *ngIf="showContentDay"
  >
  </router-outlet>

</div>
