<div class="container mt-4">

  <div class="card p-4 shadow">

    <h2 class="text-primary mb-4">
      User Form
    </h2>

    <div class="mb-3">
      <label class="form-label">
        Name
      </label>

      <input
        type="text"
        class="form-control"
        [(ngModel)]="name"
        placeholder="Enter your name"
      >

      <p class="mt-2">
        Your Name is:
        <strong>{{ name }}</strong>
      </p>
    </div>

    <div class="mb-3">
      <label class="form-label">
        Age
      </label>

      <input
        type="number"
        class="form-control"
        [(ngModel)]="age"
        placeholder="Enter your age"
      >

      <p class="mt-2">
        Your Age is:
        <strong>{{ age }}</strong>
      </p>
    </div>

    <button class="btn btn-success">
      Submit
    </button>

  </div>

</div>
