<div class="card p-4">

  <h3 class="mb-4">
    User Registration
  </h3>

  <form
    [formGroup]="form"
    (ngSubmit)="register()"
  >

    <!-- Email -->

    <div class="mb-3">

      <label class="form-label">
        Email
      </label>

      <input
        type="email"
        class="form-control"
        formControlName="email"
      >

      <small
        class="text-danger"
        *ngIf="
          form.controls['email'].touched &&
          form.controls['email'].invalid
        "
      >
        Valid email required
      </small>

    </div>

    <!-- Password -->

    <div class="mb-3">

      <label class="form-label">
        Password
      </label>

      <input
        type="password"
        class="form-control"
        formControlName="password"
      >

      <small
        class="text-danger"
        *ngIf="
          form.controls['password'].touched &&
          form.controls['password'].invalid
        "
      >
        Minimum 6 characters required
      </small>

    </div>

    <!-- Confirm Password -->

    <div class="mb-3">

      <label class="form-label">
        Confirm Password
      </label>

      <input
        type="password"
        class="form-control"
        formControlName="confirmPassword"
      >

    </div>

    <!-- Role -->

    <div class="mb-3">

      <label class="form-label">
        Role
      </label>

      <select
        class="form-select"
        formControlName="role"
      >

        <option value="User">
          User
        </option>

        <option value="Admin">
          Admin
        </option>

      </select>

    </div>

    <!-- Success -->

    <div
      *ngIf="successMessage"
      class="alert alert-success"
    >
      {{ successMessage }}
    </div>

    <!-- Error -->

    <div
      *ngIf="errorMessage"
      class="alert alert-danger"
    >
      {{ errorMessage }}
    </div>

    <!-- Submit -->

    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="form.invalid"
    >
      Register
    </button>

  </form>

</div>
