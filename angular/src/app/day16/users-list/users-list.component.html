<div class="card p-4">

  <div class="d-flex flex-wrap align-items-center gap-2 mb-3">

    <div>

      <h3 class="mb-1">
        Users
      </h3>

      <p class="text-muted mb-0">
        Current role: {{ role || 'Not logged in' }}
      </p>

    </div>

    <button
      type="button"
      class="btn btn-dark ms-auto"
      (click)="fetchUsers()"
      [disabled]="isLoading"
    >
      {{ isLoading ? 'Loading...' : 'Fetch All Users' }}
    </button>

  </div>

  <div
    *ngIf="errorMessage"
    class="alert alert-danger"
  >
    {{ errorMessage }}
  </div>

  <div
    *ngIf="users.length"
    class="table-responsive"
  >

    <table class="table table-bordered table-striped align-middle">

      <thead>

        <tr>

          <th>
            Id
          </th>

          <th>
            Email
          </th>

          <th>
            Role
          </th>

        </tr>

      </thead>

      <tbody>

        <tr *ngFor="let user of users">

          <td>
            {{ user.id }}
          </td>

          <td>
            {{ user.email }}
          </td>

          <td>
            {{ user.role }}
          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
