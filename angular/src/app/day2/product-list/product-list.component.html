<h2>Product List</h2>

<p class="text-muted">
  Custom pipe demo: product names are shown in raw format and after using the
  <code>capitalize</code> pipe.
</p>

<button class="btn btn-primary mb-3" (click)="toggleProducts()">
  Toggle Products
</button>

<div *ngIf="showProducts">

  <ul class="list-group">

    <li
      class="list-group-item"
      *ngFor="let product of products"
    >
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <small class="text-muted d-block">Before pipe: {{ product.name }}</small>
          <small>After capitalize pipe: {{ product.name | capitalize }}</small>
        </div>

        <span class="badge bg-success">
          Rs. {{ product.price }}
        </span>
      </div>
    </li>

  </ul>

</div>
