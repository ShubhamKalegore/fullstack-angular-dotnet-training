<div class="card p-4">

  <h3>Reactive Form - FormBuilder</h3>

  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
  >

    <div class="mb-3">

      <label>Email</label>

      <input
        type="email"
        class="form-control"
        formControlName="email"
      >

    </div>

    <div class="mb-3">

      <label>Password</label>

      <input
        type="password"
        class="form-control"
        formControlName="password"
      >

    </div>

    <button
      class="btn btn-warning"
      [disabled]="form.invalid"
    >
      Submit
    </button>

  </form>

</div>
