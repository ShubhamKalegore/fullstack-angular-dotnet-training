<div class="card p-4">

  <h3>Template-Driven Form</h3>

  <form #form="ngForm" (ngSubmit)="onSubmit()">

    <div class="mb-3">

      <label>Name</label>

      <input
        type="text"
        class="form-control"
        name="name"
        [(ngModel)]="user.name"
        required
      >

    </div>

    <div class="mb-3">

      <label>Email</label>

      <input
        type="email"
        class="form-control"
        name="email"
        [(ngModel)]="user.email"
        required
        email
      >

    </div>

    <button
      class="btn btn-primary"
      [disabled]="form.invalid"
    >
      Submit
    </button>

  </form>

</div>
