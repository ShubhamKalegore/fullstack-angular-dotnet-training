<div class="card border-success h-100">

  <div class="card-body">

    <h4 class="card-title text-success">
      Child Component
    </h4>

    <p class="text-muted mb-3">
      ChangeDetectionStrategy.OnPush + &#64;Input()
    </p>

    <div class="mb-2">
      <strong>Name:</strong> {{ user.name }}
    </div>

    <div class="mb-2">
      <strong>Count from parent:</strong> {{ user.count }}
    </div>

    <div class="small text-muted">
      Last child template check: {{ checkedAt }}
    </div>

  </div>

</div>
