<div class="card p-4">

  <h3>
    {{ title }} - Admin
  </h3>

  <div class="mb-3">

    <label>Name</label>

    <input
      type="text"
      class="form-control"
      [(ngModel)]="admin.name"
    >

  </div>

  <div class="mb-3">

    <label>Department</label>

    <input
      type="text"
      class="form-control"
      [(ngModel)]="admin.department"
    >

  </div>

  <button
    class="btn btn-primary"
    (click)="submitForm()"
  >
    Submit Admin
  </button>

</div>
