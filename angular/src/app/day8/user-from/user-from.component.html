<div class="card p-4">

  <h3>
    {{ title }} - User
  </h3>

  <div class="mb-3">

    <label>Name</label>

    <input
      type="text"
      class="form-control"
      [(ngModel)]="user.name"
    >

  </div>

  <div class="mb-3">

    <label>City</label>

    <input
      type="text"
      class="form-control"
      [(ngModel)]="user.city"
    >

  </div>

  <button
    class="btn btn-success"
    (click)="submitForm()"
  >
    Submit User
  </button>

</div>
